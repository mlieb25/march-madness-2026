[theme]
base            = "dark"
primaryColor    = "#1976D2"
backgroundColor = "#0d1b2a"
secondaryBackgroundColor = "#1b2838"
textColor       = "#e8ecf0"
font            = "sans serif"

[server]
headless        = true
enableCORS      = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
